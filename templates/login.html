<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 • 孩子学习日历</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    :root { --primary: #0066cc; --primary-light: #e6f0ff; --secondary: #666666; --border: #e0e0e0; }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .input-philips {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      background: white;
      transition: all 0.3s ease;
    }
    .input-philips:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary:hover { background: #0052a3; box-shadow: 0 4px 12px rgba(0,102,204,0.2); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-sm p-8">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">📚</div>
      <h1 class="text-xl font-semibold" style="color:var(--primary)">孩子学习日历</h1>
      <p class="text-sm mt-1" style="color:var(--secondary)">请输入访问密码</p>
    </div>

    {% if error %}
    <div class="mb-4 text-sm text-center text-red-600 bg-red-50 border border-red-200 rounded-lg py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-4">
      <input type="password" name="password" placeholder="密码" autofocus required
             class="input-philips w-full" autocomplete="current-password">
      <button type="submit" class="btn-primary w-full">登录</button>
    </form>
  </div>
</body>
</html>
